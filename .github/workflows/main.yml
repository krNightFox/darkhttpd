name: Build Static darkhttpd (musl)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install musl tools and cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-arm-linux-gnueabihf

      - name: Compile with musl-gcc (static)
        run: |
          echo "🔨 Compiling darkhttpd with musl-gcc..."
          # 使用 musl-gcc 进行静态编译
          musl-gcc -static \
            -O3 -flto=auto -funroll-loops \
            -march=armv7-a -mtune=cortex-a7 \
            -o darkhttpd darkhttpd.c
          
          echo "📏 Stripping debug symbols..."
          strip darkhttpd
          
          echo "✅ Build complete! File size:"
          ls -lh darkhttpd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkhttpd-static-musl
          path: darkhttpd
