name: Build Optimized darkhttpd for Hi3798MV100

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          # 安装标准的 ARM 硬浮点交叉编译器
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Compile with Performance Flags
        run: |
          echo "🔨 Compiling for Cortex-A7 + NEON + VFPv4..."
          
          # 定义针对 Hi3798MV100 (Cortex-A7) 的极致优化参数
          export CC=arm-linux-gnueabihf-gcc
          export CFLAGS="-march=armv7-a -mtune=cortex-a7 -mfpu=neon-vfpv4 -mfloat-abi=hard -O3 -ffast-math -funroll-loops"
          export LDFLAGS="-s" # -s 代表 strip，去除调试信息，减小体积

          # 下载并编译 darkhttpd
          wget https://github.com/nicm/darkhttpd/archive/refs/heads/master.tar.gz -O darkhttpd.tar.gz
          tar xzf darkhttpd.tar.gz
          cd darkhttpd-master
          
          make clean
          make
          
          # 验证架构
          file darkhttpd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkhttpd-hi3798mv100
          path: darkhttpd-master/darkhttpd
