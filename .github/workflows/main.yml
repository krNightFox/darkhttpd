name: Build Static darkhttpd with musl

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许在 GitHub 界面手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用 messense/musl-cross 镜像，它内置了 ARM 的 musl 交叉编译工具链
      - name: Build darkhttpd with musl-gcc
        run: |
          echo "🔨 Starting compilation with musl-gcc..."
          arm-linux-musleabihf-gcc -static \
            -O3 -flto=auto -funroll-loops \
            -march=armv7-a -mtune=cortex-a7 \
            -o darkhttpd darkhttpd.c
          
          echo "📏 Stripping debug symbols..."
          arm-linux-musleabihf-strip --strip-all darkhttpd
          
          echo "📦 Final binary info:"
          ls -lh darkhttpd
          file darkhttpd

      # 将编译好的二进制文件作为 Artifact 上传，方便你下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkhttpd-armv7-musl-static
          path: darkhttpd
          retention-days: 7
