name: Build Static darkhttpd (True Musl + Cortex-A7)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler & Musl Tools
        run: |
          sudo apt-get update
          # 关键：安装 ARM 架构的 musl 开发包
          sudo apt-get install -y gcc-arm-linux-gnueabihf musl-tools musl-dev:armhf

      - name: Compile for Cortex-A7 + NEON with Musl
        run: |
          echo "🔨 Compiling optimized darkhttpd for Hi3798MV100..."
          
          # 获取 musl:armhf 的安装路径
          MUSL_PATH=$(dpkg -L musl-dev:armhf | grep '/include$' | head -1 | sed 's|/include||')
          
          # 使用 arm-linux-gnueabihf-gcc 配合 musl 路径进行编译
          arm-linux-gnueabihf-gcc \
            -march=armv7-a -mtune=cortex-a7 -mfpu=neon-vfpv4 -mfloat-abi=hard \
            -nostdinc -isystem ${MUSL_PATH}/include \
            -L${MUSL_PATH}/lib -static \
            -Os -s \
            -o darkhttpd darkhttpd.c
          
          echo "✅ Compilation successful!"
          ls -lh darkhttpd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkhttpd-hi3798mv100-musl-static
          path: darkhttpd
