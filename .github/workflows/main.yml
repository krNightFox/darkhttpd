name: Build Static darkhttpd (Musl Cross-Make)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc g++ bison flex texinfo help2man gawk libtool-bin python3 wget cpio unzip rsync

      - name: Clone and Build musl-cross-make
        run: |
          git clone https://github.com/richfelker/musl-cross-make.git
          cd musl-cross-make
          # 配置目标为 arm-linux-musleabihf (对应你的 Cortex-A7 + 硬浮点)
          echo "TARGET = arm-linux-musleabihf" > config.mak
          echo "OUTPUT = /opt/musl-cross" >> config.mak
          make -j$(nproc)
          sudo make install

      - name: Compile darkhttpd with Musl
        run: |
          export PATH="/opt/musl-cross/bin:$PATH"
          
          echo "🔨 Compiling optimized darkhttpd for Hi3798MV100..."
          
          # 使用 musl 交叉编译器编译
          # -mcpu=cortex-a7: 针对 A7 优化
          # -mfpu=neon-vfpv4: 开启 NEON 和 VFPv4
          # -static: 静态链接 musl
          arm-linux-musleabihf-gcc -O2 -mcpu=cortex-a7 -mfpu=neon-vfpv4 -static \
            -o darkhttpd darkhttpd.c
          
          # 自动 strip
          arm-linux-musleabihf-strip darkhttpd
          
          echo "✅ Build complete!"
          ls -lh darkhttpd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkhttpd-hi3798mv100
          path: darkhttpd
