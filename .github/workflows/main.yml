name: Build Static darkhttpd (Musl Cross-Make)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc g++ bison flex texinfo help2man gawk libtool-bin python3 wget cpio unzip rsync
      
      - name: Clone and Build musl-cross-make
        run: |
          git clone https://github.com/richfelker/musl-cross-make.git
          cd musl-cross-make
    
          # 创建 config.mak 文件，指定使用清华镜像源
          cat > config.mak << 'EOF'
      TARGET = arm-linux-musleabihf
      OUTPUT = /opt/cross
      GCC_VER = 13.2.0
      MUSL_VER = 1.2.5
      BINUTILS_VER = 2.42
      LINUX_VER = 6.7
      GMP_VER = 6.3.0
      MPFR_VER = 4.2.1
      MPC_VER = 1.3.1
      ISL_VER = 0.26

      # 关键：指定 GNU 官方源码的国内镜像
      GNU_MIRROR = https://mirrors.tuna.tsinghua.edu.cn/gnu
      EOF

        # 开始编译
          make -j$(nproc)
          sudo make install

      - name: Compile darkhttpd with Musl
        run: |
          export PATH="/opt/musl-cross/bin:$PATH"
          
          echo "🔨 Compiling optimized darkhttpd for Hi3798MV100..."
          
          # 使用 musl 交叉编译器编译
          # -mcpu=cortex-a7: 针对 A7 优化
          # -mfpu=neon-vfpv4: 开启 NEON 和 VFPv4
          # -static: 静态链接 musl
          arm-linux-musleabihf-gcc -O2 -mcpu=cortex-a7 -mfpu=neon-vfpv4 -static \
            -o darkhttpd darkhttpd.c
          
          # 自动 strip
          arm-linux-musleabihf-strip darkhttpd
          
          echo "✅ Build complete!"
          ls -lh darkhttpd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkhttpd-hi3798mv100
          path: darkhttpd
