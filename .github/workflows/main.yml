name: Build darkhttpd (Musl Static + A7 Optimized)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc g++ bison flex texinfo help2man \
            gawk libtool-bin python3 wget cpio unzip rsync file

      - name: Setup Musl Cross-Compiler (With Mirror Fix & Stable GCC)
        run: |
          echo "🔨 Cloning musl-cross-make..."
          git clone https://github.com/richfelker/musl-cross-make.git
          cd musl-cross-make
          
          # 创建 config.mak 文件，指定使用清华镜像源和稳定版 GCC
          cat > config.mak << 'EOF'
TARGET = arm-linux-musleabihf
OUTPUT = /opt/cross
GCC_VER = 12.2.0
MUSL_VER = 1.2.5
BINUTILS_VER = 2.42
LINUX_VER = 6.7
GMP_VER = 6.3.0
MPFR_VER = 4.2.1
MPC_VER = 1.3.1
ISL_VER = 0.26

# 关键：指定 GNU 官方源码的国内镜像
GNU_MIRROR = https://mirrors.tuna.tsinghua.edu.cn/gnu
EOF

          echo "⏳ Building cross-compiler (this takes time, ~15-20 mins)..."
          make -j$(nproc) || { echo "❌ Build failed. Check logs."; exit 1; }
          
          echo "✅ Cross-compiler built successfully."
          echo "/opt/cross/bin" >> $GITHUB_PATH

      - name: Compile darkhttpd
        run: |
          echo "🔧 Compiling darkhttpd with optimized flags for Cortex-A7..."
          arm-linux-musleabihf-gcc -Os -march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -ffunction-sections -fdata-sections -Wl,--gc-sections -static -o darkhttpd darkhttpd.c
          
          echo "📦 Stripping binary to minimize size..."
          arm-linux-musleabihf-strip --strip-all darkhttpd
          
          echo "📊 Final binary info:"
          file darkhttpd
          ls -lh darkhttpd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkhttpd-armhf-musl-static
          path: darkhttpd
